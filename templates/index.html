<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python ChatBot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 90%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .chat-header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }

        .bot-message {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 5px;
        }

        .message-timestamp {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 5px;
            display: block;
        }

        .chat-input {
            display: flex;
            padding: 15px;
            background: #f8f9fa;
            border-top: 1px solid #eee;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .chat-input input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.25);
        }

        .chat-input button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0 20px;
            margin-left: 10px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .chat-input button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .chat-input button:active {
            transform: translateY(0);
        }

        .clear-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        .clear-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .loading {
            opacity: 0.6;
        }

        .no-messages {
            text-align: center;
            color: #666;
            font-style: italic;
            margin-top: 50px;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .chat-container {
                width: 95%;
                height: 95vh;
            }

            .chat-header h1 {
                font-size: 1.2rem;
            }

            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 ChatBot</h1>
            <p>Your friendly Python-powered assistant</p>
            <button class="clear-btn" id="clearBtn">✕</button>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="no-messages" id="noMessages">
                Start a conversation by saying hello!
            </div>
        </div>

        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const chatMessages = document.getElementById('chatMessages');
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const clearBtn = document.getElementById('clearBtn');
            const noMessages = document.getElementById('noMessages');

            // Load existing messages on page load
            loadMessages();

            // Send message when button is clicked
            sendBtn.addEventListener('click', sendMessage);

            // Send message when Enter key is pressed
            userInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            // Clear chat when clear button is clicked
            clearBtn.addEventListener('click', clearChat);

            function sendMessage() {
                const message = userInput.value.trim();
                if (!message) return;

                // Disable input while sending
                userInput.disabled = true;
                sendBtn.disabled = true;
                sendBtn.textContent = 'Sending...';

                // Add user message to UI immediately
                addMessageToUI(message, 'user');

                // Clear input
                userInput.value = '';

                // Send message to server
                fetch('/send_message', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                })
                .then(response => response.json())
                .then(data => {
                    // Add bot message to UI
                    if (data.bot_message) {
                        addMessageToUI(data.bot_message.message, 'bot');
                    }

                    // Re-enable input
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    sendBtn.textContent = 'Send';
                    userInput.focus();
                })
                .catch(error => {
                    console.error('Error:', error);
                    // Re-enable input even on error
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    sendBtn.textContent = 'Send';
                });
            }

            function addMessageToUI(message, type) {
                // Hide "no messages" placeholder
                if (noMessages) {
                    noMessages.style.display = 'none';
                }

                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message', `${type}-message`);

                const messageText = document.createElement('div');
                messageText.textContent = message;

                const timestamp = document.createElement('div');
                timestamp.classList.add('message-timestamp');
                timestamp.textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                messageDiv.appendChild(messageText);
                messageDiv.appendChild(timestamp);

                chatMessages.appendChild(messageDiv);

                // Scroll to bottom
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function loadMessages() {
                fetch('/get_messages')
                .then(response => response.json())
                .then(data => {
                    // Clear existing messages
                    chatMessages.innerHTML = '';

                    if (data.messages && data.messages.length > 0) {
                        noMessages.style.display = 'none';
                        data.messages.forEach(msg => {
                            addMessageToUI(msg.message, msg.type);
                        });
                    } else {
                        noMessages.style.display = 'block';
                    }
                })
                .catch(error => {
                    console.error('Error loading messages:', error);
                });
            }

            function clearChat() {
                if (confirm('Are you sure you want to clear the chat history?')) {
                    fetch('/clear_chat', {
                        method: 'POST'
                    })
                    .then(response => response.json())
                    .then(data => {
                        // Clear UI
                        chatMessages.innerHTML = '';
                        if (noMessages) {
                            noMessages.style.display = 'block';
                        }
                    })
                    .catch(error => {
                        console.error('Error clearing chat:', error);
                    });
                }
            }

            // Focus input on load
            userInput.focus();
        });
    </script>
</body>
</html>
